<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toca do Coelho - Loja de Vantagens</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#111',
                            light: '#eee'
                        },
                        mestre: {
                            bg: '#1f2937', 
                            brown: '#78350f',
                            orange: '#ea580c'
                        },
                        oraculo: {
                            bg: '#1e3a8a', 
                            blue: '#bfdbfe',
                            border: '#93c5fd'
                        },
                        sanguessuga: {
                            bg: '#000000',
                            red: '#dc2626',
                            darkred: '#991b1b'
                        },
                        pilantra: {
                            bg: '#2e1065',
                            purple: '#a855f7'
                        },
                        angustiada: {
                            bg: '#1a0d00',
                            orange: '#f97316'
                        },
                        revoltado: {
                            bg: '#1a0000',
                            purple: '#9333ea',
                            red: '#ef4444'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-black/40 backdrop-blur-md border border-white/10;
            }
        }
        
        body {
            transition: background-color 0.5s ease-in-out, color 0.5s ease-in-out;
            min-height: 100vh;
            color: #f3f4f6;
        }

        /* Theming Classes */
        body.theme-mestre { @apply bg-mestre-bg; }
        body.theme-mestre .card { @apply border-mestre-brown shadow-[0_0_15px_rgba(234,88,12,0.3)]; }
        body.theme-mestre .btn-primary { @apply bg-mestre-orange hover:bg-orange-500 text-white; }
        body.theme-mestre .text-highlight { @apply text-mestre-orange; }

        body.theme-a-oraculo { @apply bg-gray-900; }
        body.theme-a-oraculo .card { @apply border-oraculo-border shadow-[0_0_15px_rgba(191,219,254,0.1)]; }
        body.theme-a-oraculo .btn-primary { @apply bg-oraculo-blue text-gray-900 hover:bg-blue-300 font-bold; }
        body.theme-a-oraculo .text-highlight { @apply text-oraculo-blue; }

        body.theme-a-sanguessuga { @apply bg-gray-950; }
        body.theme-a-sanguessuga .card { @apply border-sanguessuga-darkred shadow-[0_0_15px_rgba(220,38,38,0.2)]; }
        body.theme-a-sanguessuga .btn-primary { @apply bg-sanguessuga-red hover:bg-red-500 text-white; }
        body.theme-a-sanguessuga .text-highlight { @apply text-sanguessuga-red; }

        body.theme-o-pilantra { @apply bg-gray-900; }
        body.theme-o-pilantra .card { @apply border-pilantra-bg shadow-[0_0_15px_rgba(168,85,247,0.2)]; }
        body.theme-o-pilantra .btn-primary { @apply bg-pilantra-purple hover:bg-purple-400 text-white; }
        body.theme-o-pilantra .text-highlight { @apply text-pilantra-purple; }

        body.theme-a-angustiada { @apply bg-gray-900; }
        body.theme-a-angustiada .card { @apply border-angustiada-bg shadow-[0_0_15px_rgba(249,115,22,0.2)]; }
        body.theme-a-angustiada .btn-primary { @apply bg-angustiada-orange hover:bg-orange-400 text-white; }
        body.theme-a-angustiada .text-highlight { @apply text-angustiada-orange; }

        body.theme-o-revoltado { @apply bg-gray-950; }
        body.theme-o-revoltado .card { @apply border-revoltado-red shadow-[0_0_15px_rgba(239,68,68,0.2)]; border-image: linear-gradient(to right, #9333ea, #ef4444) 1; }
        body.theme-o-revoltado .btn-primary { @apply bg-gradient-to-r from-revoltado-purple to-revoltado-red text-white hover:opacity-90; }
        body.theme-o-revoltado .text-highlight { @apply text-transparent bg-clip-text bg-gradient-to-r from-revoltado-purple to-revoltado-red; }

        /* Default fallback Theme */
        body.theme-default { @apply bg-gray-900; }
        body.theme-default .card { @apply border-gray-700; }
        body.theme-default .btn-primary { @apply bg-gray-700 hover:bg-gray-600; }
        body.theme-default .text-highlight { @apply text-gray-300; }

        /* Base styles for forms and cards */
        .card {
            @apply glass rounded-xl p-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg border-2;
        }
        
        .input-field {
            @apply w-full bg-white/5 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="theme-default font-sans antialiased">
    <!-- Overlay/Toast for notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
    
    <!-- Main App Container -->
    <main id="app" class="min-h-screen flex flex-col relative w-full container mx-auto px-4 py-8">
        <!-- Views will be injected here by app.js -->
        <div id="loading-view" class="flex flex-col items-center justify-center flex-1 min-h-[60vh] animate-pulse">
            <h1 class="text-3xl font-bold tracking-widest text-white/50 uppercase">Toca do Coelho</h1>
            <p class="text-white/30 mt-2">Carregando sistema...</p>
        </div>
    </main>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 transition-opacity duration-300 drop-shadow-2xl">
        <!-- Modal injected via UI.js -->
    </div>

    <!-- Firebase v8 Compat scripts (easier for simple CDN implementations) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Application Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
